<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Amiri:ital,wght@0,400;0,700;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --blue:      #7a9bc4;
  --blue-deep: #4a6a94;
  --blue-lt:   #b8d0e8;
  --blush:     #f4c8c0;
  --gold:      #c8a04a;
  --gold-lt:   #e8cc88;
  --dark:      #1a2a3a;
  --mid:       #3a4a5a;
  --card-bg:   #eef4fa;
}

body {
  min-height: 100vh;
  background: linear-gradient(160deg,#2c1a0a 0%,#1e130a 30%,#26180c 70%,#1a1008 100%);
  font-family: 'Jost', sans-serif;
  overflow-x: hidden;
}

/* ─── PETALS ─── */
#petals { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.petal {
  position: absolute; top: -30px;
  opacity: 0; animation: fall linear infinite;
  border-radius: 50% 0 50% 0;
}
@keyframes fall {
  0%   { transform: translateY(0) rotate(0deg); opacity: 0; }
  6%   { opacity: .7; }
  94%  { opacity: .4; }
  100% { transform: translateY(108vh) rotate(540deg); opacity: 0; }
}

/* ─── NAVBAR ─── */
nav {
  position: sticky; top: 0; z-index: 50;
  background: linear-gradient(135deg, #1a1008 0%, #2c1a0a 50%, #1e130a 100%);
  border-bottom: 1px solid rgba(200,160,74,.25);
  padding: 12px 20px 14px;
  text-align: center;
  box-shadow: 0 3px 28px rgba(0,0,0,.45), 0 1px 0 rgba(200,160,74,.15) inset;
}
.nav-sub {
  font-weight: 200; font-size: clamp(.56rem,1.5vw,.7rem);
  letter-spacing: .42em; text-transform: uppercase; color: var(--gold-lt);
  opacity: .8; margin-bottom: 2px;
}
.nav-couple {
  font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 400;
  font-size: clamp(1.4rem,4vw,2rem); color: #f5e8d0; line-height: 1;
  display: flex; align-items: center; justify-content: center; gap: 14px;
}
.nav-rule {
  display: inline-block; width: 40px; height: 1px;
  background: linear-gradient(to right, transparent, var(--gold), transparent);
}

/* ─── MAIN ─── */
main {
  position: relative; z-index: 1;
  display: flex; flex-direction: column; align-items: center;
  padding: 20px 12px 20px;
}

/* when card is open, main fills exactly the remaining viewport */
.card-open main {
  padding: 12px 12px 12px;
}

/* ─── HINT ─── */
.hint {
  font-size: .7rem; font-weight: 300; letter-spacing: .24em;
  text-transform: uppercase; color: var(--gold-lt); opacity: .75;
  margin-bottom: 28px;
  animation: bob 2.8s ease-in-out infinite, fadeUp .8s .4s both;
}
@keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }

/* ─── ENVELOPE WRAP ─── */
.envelope-wrap {
  width: min(520px, 94vw);
  display: flex; flex-direction: column; align-items: center;
  animation: fadeUp .8s .15s both;
}

/* envelope disappear on open */
.env-box-wrap {
  width: 100%;
  transition: opacity .4s ease, transform .4s ease, max-height .5s ease .35s;
  max-height: 600px; overflow: hidden;
}
.is-open .env-box-wrap {
  opacity: 0;
  transform: scale(.96);
  max-height: 0;
  pointer-events: none;
}

/* ── Envelope box ── */
.env-box {
  width: 100%; position: relative;
  cursor: pointer;
  filter: drop-shadow(0 10px 40px rgba(74,106,148,.25));
  transition: filter .3s, transform .3s;
}
.env-box:hover {
  filter: drop-shadow(0 18px 55px rgba(74,106,148,.35));
  transform: translateY(-5px);
}
.env-svg { display: block; width: 100%; }

/* ── Ribbon ── */
.env-ribbon { position: absolute; inset: 0; pointer-events: none; }
.rib-h-left {
  position: absolute; top: 40%; left: 0; width: 50%; height: 26px;
  transform: translateY(-50%);
  background: linear-gradient(to bottom,
    var(--gold-lt) 0%, var(--gold) 35%, #9a7228 50%, var(--gold) 65%, var(--gold-lt) 100%);
  box-shadow: 0 1px 8px rgba(160,120,48,.3);
  transition: transform .5s cubic-bezier(.4,0,.2,1), opacity .4s ease .05s;
}
.rib-h-right {
  position: absolute; top: 40%; right: 0; width: 50%; height: 26px;
  transform: translateY(-50%);
  background: linear-gradient(to bottom,
    var(--gold-lt) 0%, var(--gold) 35%, #9a7228 50%, var(--gold) 65%, var(--gold-lt) 100%);
  box-shadow: 0 1px 8px rgba(160,120,48,.3);
  transition: transform .5s cubic-bezier(.4,0,.2,1), opacity .4s ease .05s;
}
.rib-v {
  position: absolute; left: 50%; top: 0; bottom: 38%; width: 26px;
  transform: translateX(-50%);
  background: linear-gradient(to right,
    var(--gold-lt) 0%, var(--gold) 35%, #9a7228 50%, var(--gold) 65%, var(--gold-lt) 100%);
  box-shadow: 1px 0 8px rgba(160,120,48,.3);
  transition: transform .5s cubic-bezier(.4,0,.2,1) .04s, opacity .4s ease .1s;
}
.rib-bow {
  position: absolute; top: 40%; left: 50%;
  transform: translate(-50%,-50%);
  width: 100px; height: 64px; pointer-events: none;
  transition: transform .4s cubic-bezier(.4,0,.2,1), opacity .3s ease;
}
.rib-bow svg { width: 100%; height: 100%; overflow: visible; }

/* ribbon open states */
.is-open .rib-h-left  { transform: translateY(-50%) translateX(-105%); opacity: 0; }
.is-open .rib-h-right { transform: translateY(-50%) translateX(105%);  opacity: 0; }
.is-open .rib-v       { transform: translateX(-50%) translateY(-115%); opacity: 0; }
.is-open .rib-bow     { transform: translate(-50%,-50%) scale(0) rotate(200deg); opacity: 0; }

/* ── Flap ── */
.env-flap-wrap {
  position: absolute; top: 0; left: 0; right: 0;
  transform-origin: top center;
  transform-style: preserve-3d;
  perspective: 800px;
  transition: transform .6s ease .38s;
  z-index: 10;
}
.is-open .env-flap-wrap { transform: rotateX(-178deg); }
.is-open .env-label { display: none; }
.env-flap-svg { display: block; width: 100%; }

/* ── Card reveal ── */
.card-reveal {
  width: 100%; overflow: hidden;
  max-height: 0; opacity: 0;
  transition: max-height 1s cubic-bezier(.4,0,.2,1) .45s,
              opacity .6s ease .55s;
}
.is-open .card-reveal {
  max-height: 2000px;
  opacity: 1;
}

/* warm envelope-matching frame around the card image */
.card-frame {
  background: linear-gradient(170deg, #faeade 0%, #f0d8be 50%, #e8c8a8 100%);
  border-radius: 8px;
  padding: 8px;
  box-shadow:
    0 24px 70px rgba(90,50,10,.3),
    0 6px 20px rgba(90,50,10,.18),
    inset 0 1px 0 rgba(255,255,255,.4),
    inset 0 0 0 1px rgba(200,160,74,.3);
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.card-frame::before {
  content: '';
  position: absolute; inset: 4px;
  border: 1px solid rgba(200,160,74,.35);
  border-radius: 5px;
  pointer-events: none;
  z-index: 1;
}
#invImg {
  display: block;
  width: 100%;
  height: auto;
  max-height: calc(100vh - 130px);
  object-fit: contain;
  border-radius: 4px;
  position: relative;
  z-index: 0;
}

/* ═══════════════════════════════════════
   ORIGINAL CARD — blue floral Islamic style
   ═══════════════════════════════════════ */
.inv-card {
  background: linear-gradient(180deg, #ddeaf8 0%, #eef4fa 30%, #f8f4fc 100%);
  border-radius: 6px;
  padding: clamp(28px,5vw,44px) clamp(20px,4vw,34px) clamp(24px,5vw,38px);
  text-align: center;
  position: relative;
  box-shadow: 0 16px 56px rgba(74,106,148,.18), inset 0 0 0 1px rgba(122,155,196,.2);
}

/* soft watermark wash */
.inv-card::before {
  content: ''; position: absolute; inset: 0; border-radius: inherit;
  background:
    radial-gradient(ellipse at 10% 5%,  rgba(180,210,240,.5) 0%, transparent 45%),
    radial-gradient(ellipse at 90% 5%,  rgba(200,180,230,.35) 0%, transparent 40%),
    radial-gradient(ellipse at 10% 95%, rgba(180,210,240,.4) 0%, transparent 45%),
    radial-gradient(ellipse at 90% 95%, rgba(200,180,230,.3) 0%, transparent 40%);
  pointer-events: none;
}

/* thin border frame */
.inv-border {
  position: absolute; inset: 8px;
  border: 1px solid rgba(122,155,196,.35); border-radius: 4px; pointer-events: none;
}
.inv-border::after {
  content: ''; position: absolute; inset: 5px;
  border: 1px solid rgba(122,155,196,.18); border-radius: 3px;
}

/* ── Floral corner SVGs ── */
.corner { position: absolute; width: 80px; height: 80px; opacity: .85; }
.corner-tl { top: 8px; left: 8px; }
.corner-tr { top: 8px; right: 8px; transform: scaleX(-1); }
.corner-bl { bottom: 8px; left: 8px; transform: scaleY(-1); }
.corner-br { bottom: 8px; right: 8px; transform: scale(-1,-1); }

.c-body { position: relative; z-index: 1; }

/* ── Bismillah ── */
.bismillah-arabic {
  font-family: 'Amiri', serif; font-size: clamp(1.6rem,5vw,2.2rem);
  color: var(--dark); line-height: 1.2; margin-bottom: 6px;
  direction: rtl;
}
.bismillah-english {
  font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 300;
  font-size: clamp(.82rem,2vw,.98rem); color: var(--mid);
  line-height: 1.6; margin-bottom: 18px;
}

/* ── Gold rule ── */
.gold-rule {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  margin: 10px 0 16px;
}
.gr-line { flex:1; max-width:60px; height:1px; }
.gr-line.l { background: linear-gradient(to right, transparent, var(--gold)); }
.gr-line.r { background: linear-gradient(to left,  transparent, var(--gold)); }
.gr-gem { font-size:9px; color:var(--gold); }

/* ── Intro text ── */
.inv-intro {
  font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 300;
  font-size: clamp(.88rem,2.2vw,1.05rem); color: var(--mid);
  line-height: 1.75; margin-bottom: 8px;
}
.inv-event-label {
  font-weight: 200; font-size: clamp(.56rem,1.5vw,.68rem);
  letter-spacing: .4em; text-transform: uppercase; color: var(--blue-deep);
  margin-bottom: 14px;
}

/* ── Couple names — calligraphic ── */
.inv-names {
  font-family: 'Playfair Display', serif; font-style: italic;
  font-size: clamp(2.2rem,6vw,3.2rem); color: var(--dark);
  line-height: 1.1; margin-bottom: 4px;
  animation: nameGlow 4s ease-in-out infinite;
}
@keyframes nameGlow {
  0%,100% { text-shadow: none; }
  50%      { text-shadow: 0 0 24px rgba(122,155,196,.35); }
}
.inv-amp {
  font-family: 'Cormorant Garamond', serif; font-style: italic;
  font-size: clamp(1.5rem,3.5vw,2rem); color: var(--blue); display: block; line-height: 1.1;
}

/* ── Date block ── */
.date-wrap { margin: 16px 0 8px; }
.date-month-label {
  font-family: 'Cormorant Garamond', serif; font-style: italic;
  font-size: clamp(.9rem,2.2vw,1.1rem); color: var(--mid); margin-bottom: 2px;
}
.date-row {
  display: flex; align-items: baseline; justify-content: center; gap: 16px;
  margin: 4px 0 6px;
}
.date-day-name {
  font-weight: 200; font-size: clamp(.65rem,1.7vw,.78rem);
  letter-spacing: .3em; text-transform: uppercase; color: var(--blue-deep);
  border-bottom: 1px solid rgba(122,155,196,.3); padding-bottom: 2px; min-width: 60px;
}
.date-num {
  font-family: 'Playfair Display', serif; font-weight: 700;
  font-size: clamp(3rem,7.5vw,4rem); color: var(--dark); line-height: 1;
}
.date-time {
  font-weight: 200; font-size: clamp(.65rem,1.7vw,.78rem);
  letter-spacing: .3em; text-transform: uppercase; color: var(--blue-deep);
  border-bottom: 1px solid rgba(122,155,196,.3); padding-bottom: 2px; min-width: 60px;
}
.date-year {
  font-weight: 200; font-size: clamp(.62rem,1.6vw,.76rem);
  letter-spacing: .32em; color: var(--blue); margin-bottom: 14px;
}

/* ── Venue ── */
.inv-venue {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1rem,2.6vw,1.25rem); color: var(--dark); line-height: 1.45;
  margin-bottom: 3px;
}
.inv-venue-city {
  font-weight: 200; font-size: clamp(.58rem,1.5vw,.7rem);
  letter-spacing: .28em; text-transform: uppercase; color: var(--blue-deep); display: block;
}

/* ── QR placeholder ── */
.qr-wrap {
  margin-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 6px;
}
.qr-box {
  width: 80px; height: 80px; border: 1px solid rgba(122,155,196,.4); border-radius: 4px;
  background: white; padding: 5px; position: relative; overflow: hidden;
}
/* CSS-drawn QR-like pattern */
.qr-box::before {
  content: ''; position: absolute; inset: 4px;
  background-image:
    repeating-linear-gradient(0deg, rgba(26,42,58,.8) 0px, rgba(26,42,58,.8) 2px, transparent 2px, transparent 6px),
    repeating-linear-gradient(90deg, rgba(26,42,58,.8) 0px, rgba(26,42,58,.8) 2px, transparent 2px, transparent 6px);
  background-size: 6px 6px;
  border-radius: 1px;
}
/* QR corner markers */
.qr-box::after {
  content: ''; position: absolute;
  top: 7px; left: 7px;
  width: 18px; height: 18px;
  border: 2.5px solid rgba(26,42,58,.85); border-radius: 2px;
  box-shadow:
    42px 0 0 rgba(26,42,58,.85),
    0 42px 0 rgba(26,42,58,.85);
}
.qr-label {
  font-weight: 200; font-size: .6rem; letter-spacing: .22em;
  text-transform: uppercase; color: var(--blue-deep); opacity: .7;
}

/* ── View Location button ── */
.loc-btn-wrap {
  display: flex; justify-content: center;
  margin-top: 14px; margin-bottom: 4px;
}
.loc-btn {
  display: inline-flex; align-items: center; gap: 7px;
  background: linear-gradient(135deg, #1a2a3a 0%, #2c3e50 100%);
  color: #e8cc88;
  font-family: 'Jost', sans-serif; font-weight: 300;
  font-size: .72rem; letter-spacing: .28em; text-transform: uppercase;
  padding: 11px 26px; border-radius: 50px;
  text-decoration: none;
  border: 1px solid rgba(200,160,74,.4);
  box-shadow: 0 4px 16px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.06);
  transition: background .25s, box-shadow .25s, transform .2s;
}
.loc-btn:hover {
  background: linear-gradient(135deg, #2c3e50 0%, #3d5166 100%);
  box-shadow: 0 8px 24px rgba(0,0,0,.4);
  transform: translateY(-2px);
}

/* ── Close button ── */
.close-btn {
  margin-top: 28px; display: none;
  background: transparent;
  border: 1px solid rgba(200,160,74,.45); color: var(--gold-lt);
  font-family: 'Jost', sans-serif; font-weight: 200;
  font-size: .64rem; letter-spacing: .3em; text-transform: uppercase;
  padding: 11px 30px; border-radius: 50px; cursor: pointer;
  transition: background .25s, border-color .25s;
}
.close-btn:hover { background: rgba(200,160,74,.12); border-color: var(--gold); }
.close-btn.show { display: inline-block; animation: fadeUp .5s ease both; }

/* pulse click-to-open text */
.env-click-pulse { animation: clickPulse 2s ease-in-out infinite; }
@keyframes clickPulse { 0%,100%{opacity:.5} 50%{opacity:1} }
</style>
</head>
<body>

<!-- NAVBAR -->
<nav>
  <div class="nav-sub">You are cordially invited</div>
  <div class="nav-couple">
    <span class="nav-rule"></span>
    Saifullah &amp; Maira
    <span class="nav-rule"></span>
  </div>
  <div class="nav-sub" style="margin-top:3px">Dua-e-Khair Ceremony</div>
</nav>

<!-- PETALS -->
<div id="petals"></div>

<!-- MAIN -->
<main>
  <p class="hint" id="hint">✦ click the envelope to reveal your invitation ✦</p>

  <div class="envelope-wrap" id="envWrap">

    <!-- ENVELOPE (disappears after opening) -->
    <div class="env-box-wrap" id="envBoxWrap">
      <div class="env-box" id="envBox" onclick="openEnv()">

        <!-- Envelope body SVG -->
        <svg class="env-svg" viewBox="0 0 520 320" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="eBody" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#faeade"/>
              <stop offset="100%" stop-color="#efd5bb"/>
            </linearGradient>
            <linearGradient id="triL" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stop-color="#d8bca0"/>
              <stop offset="100%" stop-color="#efd5bb" stop-opacity="0"/>
            </linearGradient>
            <linearGradient id="triR" x1="1" y1="0" x2="0" y2="0">
              <stop offset="0%" stop-color="#c8a880"/>
              <stop offset="100%" stop-color="#efd5bb" stop-opacity="0"/>
            </linearGradient>
            <linearGradient id="triBot" x1="0" y1="1" x2="0" y2="0">
              <stop offset="0%" stop-color="#b09070"/>
              <stop offset="100%" stop-color="#efd5bb" stop-opacity="0"/>
            </linearGradient>
          </defs>
          <rect x="0" y="0" width="520" height="320" rx="6" fill="url(#eBody)"/>
          <polygon points="0,0 0,320 260,178" fill="url(#triL)"/>
          <polygon points="520,0 520,320 260,178" fill="url(#triR)"/>
          <polygon points="0,320 520,320 260,165" fill="url(#triBot)"/>
          <line x1="0" y1="0" x2="260" y2="170" stroke="rgba(150,90,50,.1)" stroke-width="1"/>
          <line x1="520" y1="0" x2="260" y2="170" stroke="rgba(150,90,50,.1)" stroke-width="1"/>
          <rect x="1" y="1" width="518" height="318" rx="5.5" fill="none"
                stroke="rgba(201,149,108,.28)" stroke-width="1"/>

          <!-- Names on lower half -->
          <text x="260" y="248" text-anchor="middle" class="env-label"
                font-family="Georgia,'Times New Roman',serif" font-style="italic"
                font-size="26" fill="rgba(80,40,15,.72)" letter-spacing="1.5">Saifullah &amp; Maira</text>
          <line x1="160" y1="258" x2="360" y2="258" class="env-label"
                stroke="rgba(160,100,50,.25)" stroke-width=".9"/>
          <text x="260" y="284" text-anchor="middle" class="env-label env-click-pulse"
                font-family="Arial,sans-serif" font-size="11"
                fill="rgba(140,80,40,.6)" letter-spacing="4">✦  CLICK TO OPEN  ✦</text>
        </svg>

        <!-- Ribbon -->
        <div class="env-ribbon">
          <div class="rib-h-left"></div>
          <div class="rib-h-right"></div>
          <div class="rib-v"></div>
          <div class="rib-bow">
            <svg viewBox="0 0 90 58" fill="none" overflow="visible">
              <defs>
                <linearGradient id="bL" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0%" stop-color="#f0d888"/>
                  <stop offset="100%" stop-color="#9a7020"/>
                </linearGradient>
                <linearGradient id="bR" x1="1" y1="0" x2="0" y2="1">
                  <stop offset="0%" stop-color="#f0d888"/>
                  <stop offset="100%" stop-color="#9a7020"/>
                </linearGradient>
                <radialGradient id="kG" cx="35%" cy="35%">
                  <stop offset="0%" stop-color="#f8e8a0"/>
                  <stop offset="100%" stop-color="#886018"/>
                </radialGradient>
              </defs>
              <path d="M45 29 C27 9, 3 6, 6 21 C9 34, 31 34, 45 29Z" fill="url(#bL)"/>
              <path d="M45 29 C30 17, 10 21, 12 27 C14 33, 33 31, 45 29Z" fill="rgba(180,140,60,.35)"/>
              <path d="M45 29 C63 9, 87 6, 84 21 C81 34, 59 34, 45 29Z" fill="url(#bR)"/>
              <path d="M45 29 C60 17, 80 21, 78 27 C76 33, 57 31, 45 29Z" fill="rgba(180,140,60,.35)"/>
              <path d="M45 29 C36 40, 20 50, 10 55" stroke="url(#bL)" stroke-width="11" stroke-linecap="round" fill="none"/>
              <path d="M45 29 C54 40, 70 50, 80 55" stroke="url(#bR)" stroke-width="11" stroke-linecap="round" fill="none"/>
              <circle cx="45" cy="29" r="10" fill="url(#kG)"/>
              <circle cx="43" cy="27" r="3" fill="rgba(255,255,255,.4)"/>
            </svg>
          </div>
        </div>

        <!-- Flap -->
        <div class="env-flap-wrap" id="envFlap">

            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0">
              <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
              <circle cx="12" cy="9" r="2.5"/>
            </svg>
            View Location
          </a>
        </div>
      </div>
    </div>
    

  </div><!-- /envelope-wrap -->

  <button class="close-btn" id="closeBtn" onclick="closeEnv()">✕ &nbsp;Close Invitation</button>
</main>

<script>
/* ─── PETALS ─── */
const pc = document.getElementById('petals');
const cols = [
  'rgba(244,200,160,.7)','rgba(232,200,140,.6)','rgba(250,220,180,.65)',
  'rgba(210,170,110,.55)','rgba(244,210,170,.7)','rgba(255,230,190,.6)'
];
for (let i = 0; i < 32; i++) {
  const d = document.createElement('div');
  d.className = 'petal';
  const s = 8 + Math.random() * 14;
  d.style.cssText = `
    width:${s}px; height:${s*1.4}px;
    left:${Math.random()*100}%;
    background:${cols[Math.floor(Math.random()*cols.length)]};
    animation-duration:${9+Math.random()*13}s;
    animation-delay:${-Math.random()*18}s;
    border-radius:${Math.random()>.5?'50% 0 50% 0':'0 50% 0 50%'};
  `;
  pc.appendChild(d);
}

/* ─── OPEN / CLOSE ─── */
function openEnv() {
  const w = document.getElementById('envWrap');
  if (w.classList.contains('is-open')) return;
  w.classList.add('is-open');
  document.body.classList.add('card-open');
  document.getElementById('hint').style.display = 'none';

  setTimeout(() => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, 420);

  setTimeout(() => {
    document.getElementById('closeBtn').classList.add('show');
  }, 1500);
}

function closeEnv() {
  const w = document.getElementById('envWrap');
  w.classList.remove('is-open');
  document.body.classList.remove('card-open');
  document.getElementById('closeBtn').classList.remove('show');
  document.getElementById('hint').style.display = '';
  document.getElementById('invImg').style.maxHeight = '';
  setTimeout(() => {
    w.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 200);
}
</script>
</body>
</html>
